services:
  - type: web
    name: law-in
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py seed && python manage.py collectstatic --noinput
    startCommand: gunicorn law_in.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DJANGO_SETTINGS_MODULE
        value: law_in.settings
